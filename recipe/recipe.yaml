schema_version: 1

context:
  name: gcloud-aio-taskqueue
  version: 7.0.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/gcloud_aio_taskqueue-${{ version }}.tar.gz
  sha256: 7a0965d057c318bbd17f08a452a674979476dbf1975c017d6aedcb5cfddd6955

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - gcloud-aio-auth >=3.1.0,<6.0.0

tests:
  - python:
      imports:
        - gcloud.aio.taskqueue
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Python Client for Google Cloud Task Queue
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/talkiq/gcloud-aio

extra:
  recipe-maintainers:
    - xylar
